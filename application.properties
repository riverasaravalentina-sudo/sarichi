# ── Servidor ──────────────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/api

# ── MongoDB Atlas ──────────────────────────────────────────────────────
spring.data.mongodb.uri=mongodb+srv://Sara:Sara123@empresarialessara.vmeolxj.mongodb.net/sarichi_crocheting
spring.data.mongodb.auto-index-creation=true

# ── JWT ───────────────────────────────────────────────────────────────
app.jwt.secret=sarichi-crocheting-secret-key-2024-very-long-secret-key-for-jwt
app.jwt.expiration=3600000
app.jwt.refresh-expiration=86400000

# ── Thymeleaf ─────────────────────────────────────────────────────────
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.check-template-location=false

# ── Actuator ──────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.show-details=always

# ── Logging ───────────────────────────────────────────────────────────
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.sarichi=DEBUG

# ── Swagger ───────────────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

# ── Encoding ──────────────────────────────────────────────────────────
spring.mandatory-file-encoding=UTF-8
