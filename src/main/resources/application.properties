server.port=${PORT:8080}
server.servlet.context-path=/api

spring.data.mongodb.uri=${MONGODB_URI:mongodb+srv://Sara:Sara123@empresarialessara.vmeolxj.mongodb.net/sarichi_crocheting}
spring.data.mongodb.auto-index-creation=true

app.jwt.secret=${JWT_SECRET:sarichi-crocheting-secret-key-2024-very-long-secret-key-for-jwt}
app.jwt.expiration=${JWT_EXPIRATION_MS:3600000}
app.jwt.refresh-expiration=${REFRESH_TOKEN_EXPIRATION_MS:86400000}

spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.check-template-location=false

spring.servlet.multipart.max-file-size=8MB
spring.servlet.multipart.max-request-size=24MB

management.endpoints.web.exposure.include=health,info,mappings
management.endpoint.health.show-details=always

logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.com.sarichi=DEBUG

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=true

spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
sarichi.mail.from=${MAIL_FROM:noreply@sarichi.com}
sarichi.app.base-url=${APP_BASE_URL:http://localhost:8080/api}

wompi.public.key=${WOMPI_PUBLIC_KEY:}
wompi.private.key=${WOMPI_PRIVATE_KEY:}
wompi.events.secret=${WOMPI_EVENTS_SECRET:}
wompi.sandbox.url=${WOMPI_SANDBOX_URL:https://sandbox.wompi.co/v1}

cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api.key=${CLOUDINARY_API_KEY:}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:}

