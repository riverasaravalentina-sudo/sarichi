<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Pedidos - Sarichi Crocheting</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .pedidos-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1rem;
        }
        .pedido-card {
            background: #fff;
            border-radius: 8px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 5px solid #3498db;
        }
        .pedido-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .pedido-id {
            font-weight: 600;
            font-size: 1.1rem;
        }
        .pedido-fecha {
            color: #666;
            font-size: 0.9rem;
        }
        .badge-estado {
            padding: 0.4rem 1rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
        }
        .estado-pendiente { background: #f39c12; }
        .estado-en-produccion { background: #3498db; }
        .estado-listo { background: #9b59b6; }
        .estado-despachado { background: #1abc9c; }
        .estado-entregado { background: #27ae60; }
        .estado-cancelado { background: #e74c3c; }
        
        .pedido-items {
            margin: 1rem 0;
            padding: 1rem;
            background: #f9f9f9;
            border-radius: 4px;
        }
        .item-pedido {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 0;
            border-bottom: 1px solid #eee;
        }
        .item-pedido:last-child {
            border-bottom: none;
        }
        .item-nombre {
            flex: 1;
        }
        .item-cant {
            min-width: 80px;
            text-align: center;
        }
        .item-subtotal {
            min-width: 120px;
            text-align: right;
            font-weight: 600;
        }
        
        .pedido-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 2px solid #ddd;
            font-weight: 700;
            font-size: 1.1rem;
        }
        
        .pedido-acciones {
            display: flex;
            gap: 0.5rem;
            margin-top: 1rem;
        }
        .btn-resena {
            flex: 1;
            padding: 0.75rem;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
        }
        .btn-resena:hover:not(:disabled) {
            background: #229954;
        }
        .btn-resena:disabled {
            background: #bdc3c7;
            cursor: not-allowed;
        }
        
        /* Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
        }
        .modal-content {
            background: white;
            margin: 5% auto;
            padding: 2rem;
            border-radius: 8px;
            max-width: 500px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .calificacion {
            display: flex;
            gap: 0.5rem;
            font-size: 2rem;
        }
        .estrella {
            cursor: pointer;
            color: #bdc3c7;
            transition: color 0.2s;
        }
        .estrella:hover,
        .estrella.selected {
            color: #f39c12;
        }
        .form-group textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            min-height: 80px;
        }
        .btn-enviar {
            width: 100%;
            padding: 1rem;
            background: #27ae60;
            color: white;
            border: none;
            border-radius: 4px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-enviar:hover {
            background: #229954;
        }
        .pedidos-vacio {
            text-align: center;
            padding: 3rem;
            color: #999;
        }
    </style>
</head>
<body>
    <div id="topnav"></div>
    <div id="toast" class="toast"></div>
    
    <div class="pedidos-container">
        <h1>📦 Mis Pedidos</h1>
        <div id="pedidosList"></div>
    </div>
    
    <!-- Modal Reseña -->
    <div id="resenaModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Reseñar Producto</h2>
                <button class="modal-close" onclick="cerrarModalResena()">&times;</button>
            </div>
            <div class="form-group">
                <label>Producto</label>
                <div id="productoNombreResena" style="padding: 0.5rem; background: #f5f5f5; border-radius: 4px;"></div>
            </div>
            <div class="form-group">
                <label>Tu calificación *</label>
                <div class="calificacion" id="estrellas"></div>
            </div>
            <div class="form-group">
                <label>Comentario</label>
                <textarea id="comentarioResena" placeholder="Comparte tu experiencia..."></textarea>
            </div>
            <button class="btn-enviar" onclick="enviarResena()">Enviar Reseña</button>
        </div>
    </div>

    <script src="sarichi.js"></script>
    <script>
        requireAuth();
        let resenaActual = { pedidoId: null, productoId: null, calificacion: 0 };
        
        async function cargarPedidos() {
            try {
                const pedidos = await apiGet('/pedidos/mis-pedidos');
                
                if (pedidos.length === 0) {
                    document.getElementById('pedidosList').innerHTML = 
                        '<div class="pedidos-vacio">No tienes pedidos aún. <a href="tienda.html">Ir a tienda</a></div>';
                    return;
                }
                
                document.getElementById('pedidosList').innerHTML = pedidos.map(pedido => `
                    <div class="pedido-card">
                        <div class="pedido-header">
                            <div>
                                <div class="pedido-id">Pedido #${pedido.id.substring(0, 8)}</div>
                                <div class="pedido-fecha">${new Date(pedido.fechaPedido).toLocaleDateString('es-CO', {
                                    year: 'numeric', month: 'long', day: 'numeric',
                                    hour: '2-digit', minute: '2-digit'
                                })}</div>
                            </div>
                            <span class="badge-estado estado-${pedido.estado.toLowerCase().replace('_', '-')}">${pedido.estado}</span>
                        </div>
                        
                        <div class="pedido-items">
                            ${pedido.items.map(item => `
                                <div class="item-pedido">
                                    <div class="item-nombre">
                                        ${item.nombreProducto}
                                        ${item.colorSolicitado ? `<br><small style="color: #999;">Color: ${item.colorSolicitado}</small>` : ''}
                                    </div>
                                    <div class="item-cant">x${item.cantidad}</div>
                                    <div class="item-subtotal">$${item.subtotal.toLocaleString('es-CO', {maximumFractionDigits: 2})}</div>
                                </div>
                            `).join('')}
                        </div>
                        
                        <div class="pedido-total">
                            <span>Total:</span>
                            <span>$${pedido.total.toLocaleString('es-CO', {maximumFractionDigits: 2})}</span>
                        </div>
                        
                        <div style="color: #666; font-size: 0.9rem; margin-top: 0.5rem;">
                            Dirección: ${pedido.direccionEnvio}
                        </div>
                        
                        ${pedido.estado === 'ENTREGADO' ? `
                            <div class="pedido-acciones">
                                ${pedido.items.map(item => `
                                    <button class="btn-resena" onclick="abrirModalResena('${pedido.id}', '${item.productoId}', '${item.nombreProducto}')">
                                        Reseñar: ${item.nombreProducto.substring(0, 20)}
                                    </button>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `).join('');
                
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        function abrirModalResena(pedidoId, productoId, productoNombre) {
            resenaActual = { pedidoId, productoId, calificacion: 0 };
            document.getElementById('productoNombreResena').textContent = productoNombre;
            document.getElementById('comentarioResena').value = '';
            
            // Crear estrellas
            const estrellas = document.getElementById('estrellas');
            estrellas.innerHTML = [1,2,3,4,5].map(i => `
                <span class="estrella" onclick="seleccionarCalificacion(${i})" data-rating="${i}">★</span>
            `).join('');
            
            document.getElementById('resenaModal').style.display = 'block';
        }
        
        function cerrarModalResena() {
            document.getElementById('resenaModal').style.display = 'none';
        }
        
        function seleccionarCalificacion(rating) {
            resenaActual.calificacion = rating;
            document.querySelectorAll('.estrella').forEach((e, i) => {
                if (i < rating) e.classList.add('selected');
                else e.classList.remove('selected');
            });
        }
        
        async function enviarResena() {
            if (resenaActual.calificacion === 0) {
                showToast('Por favor selecciona una calificación', 'error');
                return;
            }
            
            try {
                const resenaRequest = {
                    pedidoId: resenaActual.pedidoId,
                    productoId: resenaActual.productoId,
                    calificacion: resenaActual.calificacion,
                    comentario: document.getElementById('comentarioResena').value
                };
                
                await apiPost('/resenas', resenaRequest, true);
                showToast('¡Reseña enviada exitosamente!', 'success');
                cerrarModalResena();
                
            } catch (error) {
                showToast(error.message, 'error');
            }
        }
        
        // Cerrar modal al hacer clic fuera
        window.onclick = function(event) {
            const modal = document.getElementById('resenaModal');
            if (event.target === modal) {
                cerrarModalResena();
            }
        }
        
        // Inicializar
        renderNav(Auth.getRol());
        cargarPedidos();
    </script>
</body>
</html>
