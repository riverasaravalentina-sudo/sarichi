<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Recuperar Contraseña — Sarichi Crocheting</title>
  <link rel="stylesheet" href="sarichi.css">
</head>
<body>
<div class="page-auth">
  <div class="card-auth">
    <div class="auth-logo">
      <div style="font-size:2.5rem">🔑</div>
      <h1 style="font-size:1.4rem">Recuperar Contraseña</h1>
      <p>Te enviaremos un enlace a tu correo 💌</p>
    </div>

    <div id="error-msg"   class="alert alert-error"   style="display:none"></div>
    <div id="success-msg" class="alert alert-success" style="display:none"></div>

    <form id="recuperarForm">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="correo" placeholder="tu@correo.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="btnRec">
        Enviar enlace
      </button>
    </form>

    <form id="restablecerForm" style="display:none">
      <div class="form-group">
        <label>Nueva contraseña</label>
        <input type="password" id="nuevaContrasena" placeholder="Mínimo 8 caracteres" required>
      </div>
      <div class="form-group">
        <label>Confirmar contraseña</label>
        <input type="password" id="confirmarContrasena" placeholder="Repite la contraseña" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="btnRest">
        Cambiar contraseña
      </button>
    </form>

    <div class="auth-footer">
      <a href="login.html">← Volver al login</a>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script src="sarichi.js"></script>
<script>
  document.getElementById('recuperarForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btnRec');
    const err = document.getElementById('error-msg');
    const ok  = document.getElementById('success-msg');
    err.style.display = 'none'; ok.style.display = 'none';
    btn.innerHTML = '<span class="spinner"></span> Enviando...';
    btn.disabled = true;

    try {
      const data = await apiPost('/auth/recuperar', { correo: document.getElementById('correo').value });
      if (data.enlace) {
        const token = new URLSearchParams(data.enlace.split('?')[1]).get('token');
        document.getElementById('recuperarForm').style.display = 'none';
        document.getElementById('restablecerForm').style.display = 'block';
        document.getElementById('restablecerForm').dataset.token = token;
        ok.textContent = 'Correo no disponible. Ingresa tu nueva contraseña directamente.';
        ok.style.display = 'block';
        btn.innerHTML = 'Enviar enlace';
        btn.disabled = false;
      } else {
        ok.textContent = 'Si el correo está registrado, recibirás el enlace en unos minutos. Revisa tu bandeja de entrada.';
        ok.style.display = 'block';
        btn.innerHTML = '¡Enviado!';
      }
    } catch(ex) {
      ok.textContent = 'Si el correo está registrado, recibirás el enlace en unos minutos.';
      ok.style.display = 'block';
      btn.innerHTML = 'Enviar enlace';
      btn.disabled = false;
    }

    document.getElementById('restablecerForm').addEventListener('submit', async e => {
      e.preventDefault();
      const token = e.target.dataset.token;
      const btn  = document.getElementById('btnRest');
      const err  = document.getElementById('error-msg');
      const ok   = document.getElementById('success-msg');
      err.style.display = 'none'; ok.style.display = 'none';

      const nueva    = document.getElementById('nuevaContrasena').value;
      const confirmar = document.getElementById('confirmarContrasena').value;

      if (nueva !== confirmar) {
        err.textContent = 'Las contraseñas no coinciden.';
        err.style.display = 'block'; return;
      }
      if (nueva.length < 8) {
        err.textContent = 'La contraseña debe tener mínimo 8 caracteres.';
        err.style.display = 'block'; return;
      }

      btn.innerHTML = '<span class="spinner"></span> Cambiando...';
      btn.disabled = true;

      try {
        await apiPost('/auth/restablecer', { token, nuevaContrasena: nueva, confirmarContrasena: confirmar });
        ok.textContent = '✅ ¡Contraseña cambiada exitosamente! Redirigiendo al login...';
        ok.style.display = 'block';
        document.getElementById('restablecerForm').style.display = 'none';
        setTimeout(() => window.location.href = 'login.html', 2500);
      } catch(ex) {
        err.textContent = ex.message;
        err.style.display = 'block';
        btn.innerHTML = 'Cambiar contraseña';
        btn.disabled = false;
      }
    });
  });
</script>
</body>
</html>
