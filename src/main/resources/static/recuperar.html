<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Recuperar Contraseña — Sarichi Crocheting</title>
  <link rel="stylesheet" href="sarichi.css">
</head>
<body>
<div class="page-auth">
  <div class="card-auth">
    <div class="auth-logo">
      <div style="font-size:2.5rem">🔑</div>
      <h1 style="font-size:1.4rem">Recuperar Contraseña</h1>
      <p>Te enviaremos un enlace a tu correo 💌</p>
    </div>

    <div id="error-msg"   class="alert alert-error"   style="display:none"></div>
    <div id="success-msg" class="alert alert-success" style="display:none"></div>

    <form id="recuperarForm">
      <div class="form-group">
        <label>Correo electrónico</label>
        <input type="email" id="correo" placeholder="tu@correo.com" required>
      </div>
      <button type="submit" class="btn btn-primary btn-full" id="btnRec">
        Enviar enlace
      </button>
    </form>

    <div class="auth-footer">
      <a href="login.html">← Volver al login</a>
    </div>
  </div>
</div>
<div id="toast" class="toast"></div>
<script src="sarichi.js"></script>
<script>
  document.getElementById('recuperarForm').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = document.getElementById('btnRec');
    const err = document.getElementById('error-msg');
    const ok  = document.getElementById('success-msg');
    err.style.display = 'none'; ok.style.display = 'none';
    btn.innerHTML = '<span class="spinner"></span> Enviando...';
    btn.disabled = true;

    try {
      await apiPost('/auth/recuperar', { correo: document.getElementById('correo').value });
      ok.textContent = 'Si el correo está registrado, recibirás el enlace en unos minutos. Revisa tu bandeja de entrada.';
      ok.style.display = 'block';
      btn.innerHTML = '¡Enviado!';
    } catch(ex) {
      ok.textContent = 'Si el correo está registrado, recibirás el enlace en unos minutos.';
      ok.style.display = 'block';
      btn.innerHTML = 'Enviar enlace';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
