<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retos - Mercadeo Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/web/dashboard/mercadeo}">🐱 MERCADEO</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Retos y Dinámicas</h2>
      <button class="btn btn-brand" style="background:#E8527A;color:#fff">+ Nuevo reto</button>
    </div>
    <div class="card shadow-sm">
      <div class="card-body">
        <div th:if="${retos != null and !retos.isEmpty()}">
          <table class="table table-hover">
            <thead><tr><th>Reto</th><th>Descripción</th><th>Participantes</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody>
              <tr th:each="r : ${retos}">
                <td th:text="${r.titulo}">Nombre del reto</td>
                <td th:text="${r.descripcion}">Descripción</td>
                <td th:text="${r.participantes}">0</td>
                <td><span class="badge bg-success" th:text="${r.estado}">ACTIVO</span></td>
                <td>
                  <button class="btn btn-sm btn-outline-primary">Editar</button>
                  <button class="btn btn-sm btn-outline-info">Gestionar</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${retos == null or retos.isEmpty()}" class="text-center py-5">
          <div style="font-size:3rem">🏆</div>
          <h5>Retos creativos</h5>
          <p class="text-muted">Crea retos de tejido para la comunidad</p>
        </div>
      </div>
    </div>
    <a th:href="@{/web/dashboard/mercadeo}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
