<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Retos - Mercadeo Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/mercadeo}">🐱 MERCADEO</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Retos y Dinámicas</h2>
      <button class="btn btn-brand" style="background:#E8527A;color:#fff" data-bs-toggle="modal" data-bs-target="#nuevoRetoModal">+ Nuevo reto</button>
    </div>
    <div class="card shadow-sm">
      <div class="card-body">
        <div th:if="${retos != null and !retos.isEmpty()}">
          <table class="table table-hover">
            <thead><tr><th>Reto</th><th>Descripción</th><th>Participantes</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody>
              <tr th:each="r : ${retos}">
                <td th:text="${r.nombre}">Nombre del reto</td>
                <td th:text="${r.descripcion}">Descripción</td>
                <td th:text="${r.participacionesCount}">0</td>
                <td><span class="badge" th:classappend="${r.estado == 'ACTIVO'} ? 'bg-success' : (${r.estado == 'FINALIZADO'} ? 'bg-secondary' : 'bg-danger')" th:text="${r.estado}">ACTIVO</span></td>
                <td>
                  <form th:action="@{/api/web/mercadeo/retos/{id}/finalizar(id=${r.id})}" method="post" style="display:inline"
                        th:if="${r.estado == 'ACTIVO'}"
                        onsubmit="return confirm('¿Finalizar este reto?')">
                    <button type="submit" class="btn btn-sm btn-outline-warning">Finalizar</button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${retos == null or retos.isEmpty()}" class="text-center py-5">
          <div style="font-size:3rem">🏆</div>
          <h5>Retos creativos</h5>
          <p class="text-muted">Crea retos de tejido para la comunidad</p>
        </div>
      </div>
    </div>

    <!-- Modal crear reto -->
    <div class="modal fade" id="nuevoRetoModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <form th:action="@{/api/web/mercadeo/retos/crear}" method="post">
            <div class="modal-header"><h5 class="modal-title">Nuevo reto mensual</h5>
              <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
            <div class="modal-body">
              <div class="mb-3">
                <label class="form-label">Nombre del reto</label>
                <input type="text" name="nombre" class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Descripción</label>
                <textarea name="descripcion" class="form-control" rows="3" required></textarea>
              </div>
              <div class="mb-3">
                <label class="form-label">URL del patrón (PDF/imagen)</label>
                <input type="text" name="patronUrl" class="form-control">
              </div>
              <div class="row mb-3">
                <div class="col">
                  <label class="form-label">Fecha inicio</label>
                  <input type="date" name="fechaInicio" class="form-control" required>
                </div>
                <div class="col">
                  <label class="form-label">Fecha fin</label>
                  <input type="date" name="fechaFin" class="form-control" required>
                </div>
              </div>
              <div class="mb-3">
                <label class="form-label">Premio</label>
                <input type="text" name="premioDescripcion" class="form-control">
              </div>
            </div>
            <div class="modal-footer">
              <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
              <button type="submit" class="btn btn-primary">Crear reto</button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <a th:href="@{/api/web/dashboard/mercadeo}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
