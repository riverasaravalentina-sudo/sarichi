<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Analíticas - Mercadeo Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/mercadeo}">🐱 MERCADEO</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Analíticas y Métricas</h2>
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="card shadow-sm text-center p-3">
          <h6 class="text-muted">Visitas al sitio</h6>
          <h3 class="brand" th:text="${visitas}">0</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm text-center p-3">
          <h6 class="text-muted">Redes sociales</h6>
          <h3 class="accent" th:text="${seguidores}">0</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm text-center p-3">
          <h6 class="text-muted">Tasa conversión</h6>
          <h3 class="brand"><span th:text="${tasaConversion}">0</span>%</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm text-center p-3">
          <h6 class="text-muted">Pedidos/mes</h6>
          <h3 class="accent" th:text="${pedidosMes}">0</h3>
        </div>
      </div>
    </div>
    <div class="card shadow-sm">
      <div class="card-header bg-light"><h5>Exportar reportes</h5></div>
      <div class="card-body text-center py-4">
        <div class="row g-3">
          <div class="col-md-6">
            <a th:href="@{/api/web/mercadeo/reportes/exportar/pdf}" class="btn btn-outline-danger w-100">
              <i class="bi bi-file-earmark-pdf"></i> Exportar PDF
            </a>
          </div>
          <div class="col-md-6">
            <a th:href="@{/api/web/mercadeo/reportes/exportar/excel}" class="btn btn-outline-success w-100">
              <i class="bi bi-file-earmark-excel"></i> Exportar Excel
            </a>
          </div>
        </div>
      </div>
    </div>
    <a th:href="@{/api/web/dashboard/mercadeo}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
