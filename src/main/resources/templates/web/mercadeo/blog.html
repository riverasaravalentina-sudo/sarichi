<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Blog - Mercadeo Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/mercadeo}">🐱 MERCADEO</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Gestión del Blog</h2>
      <a th:href="@{/blog-admin.html}" class="btn btn-brand" style="background:#E8527A;color:#fff" target="_blank">+ Nuevo artículo</a>
    </div>
    <div class="row g-3" th:if="${articulos != null and !articulos.isEmpty()}">
      <div th:each="a : ${articulos}" class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title" th:text="${a.titulo}">Título</h5>
            <p class="card-text small text-muted" th:text="${a.resumen}">Resumen del artículo...</p>
            <p class="small text-muted">
              <span th:if="${a.fechaPublicacion}"><i class="bi bi-calendar"></i> <span th:text="${#temporals.format(a.fechaPublicacion, 'dd/MM/yyyy')}">Fecha</span></span>
              <span th:if="${a.visitas}" class="ms-2"><i class="bi bi-eye"></i> <span th:text="${a.visitas}">0</span></span>
            </p>
            <div class="d-flex justify-content-between align-items-center">
              <span class="badge" th:classappend="${a.estado == 'PUBLICADO'} ? 'bg-success' : (${a.estado == 'BORRADOR'} ? 'bg-warning' : 'bg-secondary')" th:text="${a.estado}">BORRADOR</span>
              <div>
                <a th:href="@{/blog-admin.html}" target="_blank" class="btn btn-sm btn-outline-primary">Editar</a>
                <form th:action="@{/api/web/mercadeo/blog/publicar/{id}(id=${a.id})}" method="post" style="display:inline"
                      th:if="${a.estado == 'BORRADOR'}">
                  <button type="submit" class="btn btn-sm btn-outline-success">Publicar</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div th:if="${articulos == null or articulos.isEmpty()}" class="text-center py-5">
      <div style="font-size:3rem">📝</div>
      <h5>Blog</h5>
      <p class="text-muted">Crea artículos para conectar con los clientes</p>
    </div>
    <a th:href="@{/api/web/dashboard/mercadeo}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
