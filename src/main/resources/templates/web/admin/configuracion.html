<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Configuración - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/web/dashboard/admin}">🐱 ADMIN</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Configuración del Sistema</h2>
    <div class="row g-4">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Configuración General</h5></div>
          <div class="card-body">
            <form>
              <div class="mb-3">
                <label class="form-label">Nombre de la tienda</label>
                <input type="text" class="form-control" value="Crocheting Sarichi" readonly>
              </div>
              <div class="mb-3">
                <label class="form-label">Correo de contacto</label>
                <input type="email" class="form-control" value="contacto@sarichi.com" readonly>
              </div>
              <div class="mb-3">
                <label class="form-label">Moneda</label>
                <input type="text" class="form-control" value="COP" readonly>
              </div>
            </form>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Integraciones</h5></div>
          <div class="card-body">
            <ul class="list-group list-group-flush">
              <li class="list-group-item d-flex justify-content-between align-items-center">
                Wompi (Pagos) <span class="badge bg-success">Configurado</span>
              </li>
              <li class="list-group-item d-flex justify-content-between align-items-center">
                Cloudinary (Imágenes) <span class="badge bg-warning text-dark">Pendiente</span>
              </li>
              <li class="list-group-item d-flex justify-content-between align-items-center">
                Google OAuth2 <span class="badge bg-secondary">No configurado</span>
              </li>
              <li class="list-group-item d-flex justify-content-between align-items-center">
                JavaMail <span class="badge bg-warning text-dark">Pendiente</span>
              </li>
            </ul>
          </div>
        </div>
      </div>
    </div>
    <a th:href="@{/web/dashboard/admin}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
