<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${accion} + ' usuario - Sarichi'">Usuarios</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}.btn-sarichi{background:#E8527A;color:#fff;border:none}.btn-sarichi:hover{background:#d43f68;color:#fff}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/admin}">🐱 ADMIN</a>
      <a th:href="@{/api/web/usuarios}" class="btn btn-sm btn-outline-secondary ms-auto">&larr; Volver</a>
    </div>
  </nav>
  <main class="container py-5" style="max-width:600px;">
    <h2 class="mb-4" th:text="${accion} + ' usuario'">Crear usuario</h2>
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post" th:action="@{/api/web/usuarios/guardar}">
          <input type="hidden" name="id" th:value="${usuario.id}">

          <div class="mb-3">
            <label class="form-label">Nombre</label>
            <input type="text" name="nombre" class="form-control" th:value="${usuario.nombre}" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Correo</label>
            <input type="email" name="correo" class="form-control" th:value="${usuario.correo}" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Teléfono</label>
            <input type="text" name="telefono" class="form-control" th:value="${usuario.telefono}">
          </div>

          <div class="mb-3">
            <label class="form-label">Rol</label>
            <select name="rol" class="form-select">
              <option th:each="r : ${roles}" th:value="${r.name()}" th:text="${r.name()}"
                      th:selected="${usuario.rol != null and usuario.rol.name() == r.name()}"></option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">
              <span th:text="${accion == 'Crear' ? 'Contraseña' : 'Nueva contraseña (dejar vacío para mantener)'}"></span>
            </label>
            <input type="password" name="contrasena" class="form-control"
                   th:required="${accion == 'Crear'}" th:minlength="${accion == 'Crear' ? 6 : 0}">
          </div>

          <div class="d-grid">
            <button type="submit" class="btn btn-sarichi">
              <i class="bi bi-save me-2"></i><span th:text="${accion}">Guardar</span>
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
