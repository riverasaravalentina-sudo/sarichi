<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Usuarios - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/admin}">🐱 ADMIN</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/productos}">Productos</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/colores}">Colores</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/pedidos}">Pedidos</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <h2>Gestión de Usuarios</h2>
    </div>
    <div class="card shadow-sm">
      <div class="card-body">
        <div th:if="${usuarios != null and !usuarios.isEmpty()}">
          <table class="table table-hover">
            <thead><tr><th>Nombre</th><th>Correo</th><th>Rol</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody>
              <tr th:each="u : ${usuarios}">
                <td th:text="${u.nombre}">Nombre</td>
                <td th:text="${u.correo}">correo</td>
                <td><span class="badge bg-info" th:text="${u.rol}">ROL</span></td>
                <td><span class="badge" th:classappend="${u.estado == 'ACTIVO' ? 'bg-success' : 'bg-danger'}" th:text="${u.estado}">Estado</span></td>
                <td>
                  <button class="btn btn-sm btn-outline-primary">Editar</button>
                  <button class="btn btn-sm btn-outline-danger">Desactivar</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${usuarios == null or usuarios.isEmpty()}" class="text-center py-5">
          <div style="font-size:3rem">🐱</div>
          <p class="text-muted">No hay usuarios registrados</p>
        </div>
      </div>
    </div>
    <a th:href="@{/api/web/dashboard/admin}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
