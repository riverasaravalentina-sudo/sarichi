<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Reportes - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/web/dashboard/admin}">🐱 ADMIN</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Reportes y Estadísticas</h2>
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="card shadow-sm text-center p-3">
          <h6 class="text-muted">Ventas totales</h6>
          <h3 class="brand">$<span th:text="${totalVentas}">0</span></h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm text-center p-3">
          <h6 class="text-muted">Pedidos</h6>
          <h3 class="brand" th:text="${totalPedidos}">0</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm text-center p-3">
          <h6 class="text-muted">Productos</h6>
          <h3 class="accent" th:text="${totalProductos}">0</h3>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm text-center p-3">
          <h6 class="text-muted">Clientes</h6>
          <h3 class="accent" th:text="${totalClientes}">0</h3>
        </div>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Exportar Reportes</h5></div>
          <div class="card-body">
            <div class="d-grid gap-2">
              <button class="btn btn-outline-primary"><i class="bi bi-file-earmark-pdf"></i> Exportar PDF</button>
              <button class="btn btn-outline-success"><i class="bi bi-file-earmark-excel"></i> Exportar Excel</button>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Reportes Disponibles</h5></div>
          <div class="list-group list-group-flush">
            <a class="list-group-item list-group-item-action">Ventas por período</a>
            <a class="list-group-item list-group-item-action">Productos más vendidos</a>
            <a class="list-group-item list-group-item-action">Stock crítico</a>
            <a class="list-group-item list-group-item-action">Rendimiento por artesana</a>
          </div>
        </div>
      </div>
    </div>
    <a th:href="@{/web/dashboard/admin}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
