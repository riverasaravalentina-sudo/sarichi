<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Lista de Deseos - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --rosa:#E8527A; --celeste:#2DB5C8; --crema:#FDFAF6; }
    body { background:var(--crema); font-family:'Inter',sans-serif; }
    .navbar { background:#fff; border-bottom:2px solid #f0d0da; }
    .navbar-brand { font-family:'Playfair Display',serif; color:var(--rosa)!important; }
    .page-title { font-family:'Playfair Display',serif; color:var(--rosa); }
    .card-wish { border:none; border-radius:16px; transition:transform .2s,box-shadow .2s; }
    .card-wish:hover { transform:translateY(-2px); box-shadow:0 4px 16px rgba(232,82,122,.12); }
    .empty-state { text-align:center; padding:60px 20px; color:#ccc; }
    .precio { color:var(--rosa); font-weight:700; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/api/web/">🐱 Mi Lista de Deseos</a>
      <div>
        <a href="/api/web/dashboard" class="btn btn-sm btn-outline-secondary">Volver</a>
        <a href="/api/web/logout" class="btn btn-sm btn-outline-danger ms-2">Salir</a>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <h2 class="page-title mb-3">🩷 Wishlist</h2>

    <div th:if="${success}" class="alert alert-success py-2 small" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger py-2 small" th:text="${error}"></div>

    <div class="row g-3" th:if="${items != null and !items.isEmpty()}">
      <div class="col-md-4 col-sm-6" th:each="item : ${items}">
        <div class="card card-wish shadow-sm p-3 h-100">
          <div class="text-center mb-2" style="font-size:2.5rem;">🧸</div>
          <div class="card-body p-0">
            <h6 class="fw-bold" th:text="${item.productoNombre}">Producto</h6>
            <p class="text-muted small" th:text="${item.categoria}">Categoria</p>
            <p class="precio mb-1">$<span th:text="${item.precioAlAgregar}">0</span></p>
            <small class="text-muted">
              Agregado: <span th:text="${#temporals.format(item.fechaAgregado, 'dd/MM/yyyy')}">fecha</span>
            </small>
          </div>
          <div class="d-flex gap-2 mt-2">
            <form method="post" th:action="@{/api/web/carrito/agregar}">
              <input type="hidden" name="productoId" th:value="${item.productoId}">
              <input type="hidden" name="cantidad" value="1">
              <button type="submit" class="btn btn-sm" style="background:var(--rosa);color:#fff;">
                <i class="bi bi-cart-plus"></i>
              </button>
            </form>
            <a th:href="@{/api/web/wishlist/eliminar/{id}(id=${item.productoId})}" class="btn btn-sm btn-outline-danger">
              <i class="bi bi-trash"></i>
            </a>
          </div>
        </div>
      </div>
    </div>

    <div class="empty-state" th:if="${items == null or items.isEmpty()}">
      <div style="font-size:4rem;">🐱</div>
      <p style="font-weight:600;color:#999">Tu lista de deseos está vacía</p>
      <p class="text-muted small">Explora la tienda y agrega tus productos favoritos</p>
      <a href="/api/web/tienda" class="btn" style="background:var(--rosa);color:#fff;">Explorar tienda</a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
