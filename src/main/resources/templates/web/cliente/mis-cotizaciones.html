<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mis Cotizaciones - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/cliente}">🐱 SARICHI</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><span class="nav-link text-muted" th:text="${usuarioWeb}">Usuario</span></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">📋 Mis Cotizaciones</h2>
    <div class="card shadow-sm">
      <div class="card-body">
        <div th:if="${cotizaciones != null and !cotizaciones.isEmpty()}">
          <table class="table table-hover">
            <thead><tr><th>Fecha</th><th>Producto</th><th>Descripción</th><th>Estado</th><th>Precio</th><th>Tiempo</th><th></th></tr></thead>
            <tbody>
              <tr th:each="c : ${cotizaciones}">
                <td th:text="${#temporals.format(c.fechaCreacion, 'dd/MM/yyyy')}">Fecha</td>
                <td th:text="${c.productoNombre ?: '-'}">Producto</td>
                <td th:text="${c.descripcion}">Descripción</td>
                <td>
                  <span class="badge" th:classappend="${c.estado == 'COTIZADO' ? 'bg-success' : c.estado == 'PENDIENTE' ? 'bg-warning' : 'bg-secondary'}" th:text="${c.estado}">Estado</span>
                </td>
                <td th:if="${c.precioCotizacion != null}">$<span th:text="${c.precioCotizacion}">0</span></td>
                <td th:if="${c.precioCotizacion == null}">-</td>
                <td th:text="${c.tiempoEstimado ?: '-'}">Tiempo</td>
                <td>
                  <a class="btn btn-sm btn-outline-info" th:href="@{/api/web/chat/{id}(id=${c.id})}" th:if="${c.estado == 'COTIZADO'}"><i class="bi bi-chat-dots"></i></a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${cotizaciones == null or cotizaciones.isEmpty()}" class="text-center py-5">
          <div style="font-size:3rem">📋</div>
          <p class="text-muted">No has solicitado cotizaciones aún</p>
          <a th:href="@{/api/web/pedido-personalizado}" class="btn btn-sarichi" style="background:#E8527A;color:#fff;">Solicitar cotización</a>
        </div>
      </div>
    </div>
    <a th:href="@{/api/web/dashboard/cliente}" class="btn btn-outline-secondary mt-3">&larr; Volver</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
