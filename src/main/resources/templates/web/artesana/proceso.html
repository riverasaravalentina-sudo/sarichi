<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Galería de Proceso - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/web/dashboard/artesana}">🐱 ARTESANA</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Galería del Proceso de Producción</h2>
    <div class="row g-3" th:if="${fotos != null and !fotos.isEmpty()}">
      <div th:each="foto : ${fotos}" class="col-md-4">
        <div class="card shadow-sm">
          <img th:src="${foto.url}" class="card-img-top" alt="Foto de proceso">
          <div class="card-body">
            <p class="card-text small text-muted" th:text="${foto.descripcion}">Descripción</p>
            <small class="text-muted" th:text="${foto.fecha}">Fecha</small>
          </div>
        </div>
      </div>
    </div>
    <div th:if="${fotos == null or fotos.isEmpty()}" class="text-center py-5">
      <div style="font-size:3rem">📸</div>
      <h5>Galería de proceso</h5>
      <p class="text-muted">Sube fotos del avance de tus pedidos para que los clientes vean el progreso</p>
    </div>
    <a th:href="@{/web/dashboard/artesana}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
