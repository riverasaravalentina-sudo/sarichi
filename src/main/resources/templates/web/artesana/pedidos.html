<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pedidos - Artesana Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/artesana}">🐱 ARTESANA</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Todos los Pedidos</h2>
    <div class="card shadow-sm">
      <div class="card-body">
        <div th:if="${pedidos != null and !pedidos.isEmpty()}">
          <table class="table table-hover">
            <thead><tr><th>ID</th><th>Cliente</th><th>Estado</th><th>Total</th><th>Acciones</th></tr></thead>
            <tbody>
              <tr th:each="p : ${pedidos}">
                <td th:text="${p.id}">id</td>
                <td th:text="${p.usuarioNombre}">Cliente</td>
                <td><span class="badge" th:classappend="${p.estado == 'PENDIENTE' ? 'bg-warning' : p.estado == 'EN_PRODUCCION' ? 'bg-info' : p.estado == 'LISTO' ? 'bg-success' : p.estado == 'DESPACHADO' ? 'bg-primary' : p.estado == 'ENTREGADO' ? 'bg-secondary' : 'bg-dark'}" th:text="${p.estado}">Estado</span></td>
                <td>$<span th:text="${p.total}">0</span></td>
                <td>
                  <a class="btn btn-sm btn-outline-info" th:href="@{/api/web/chat/{id}(id=${p.id})}"><i class="bi bi-chat-dots"></i> Chat</a>
                  <form th:action="@{/api/web/pedidos/{id}/estado(id=${p.id})}" method="post" style="display:inline">
                    <select name="estado" class="form-select form-select-sm d-inline w-auto" required>
                      <option value="">Cambiar...</option>
                      <option th:if="${p.estado == 'PENDIENTE'}" value="EN_PRODUCCION">→ En producción</option>
                      <option th:if="${p.estado == 'EN_PRODUCCION'}" value="LISTO">→ Listo</option>
                      <option th:if="${p.estado == 'LISTO'}" value="DESPACHADO">→ Despachado</option>
                      <option th:if="${p.estado == 'DESPACHADO'}" value="ENTREGADO">→ Entregado</option>
                      <option th:if="${p.estado != 'ENTREGADO' and p.estado != 'CANCELADO'}" value="CANCELADO">✕ Cancelar</option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-right"></i></button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${pedidos == null or pedidos.isEmpty()}" class="text-center py-5">
          <div style="font-size:3rem">🧵</div>
          <p class="text-muted">No hay pedidos asignados</p>
        </div>
      </div>
    </div>
    <a th:href="@{/api/web/dashboard/artesana}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
