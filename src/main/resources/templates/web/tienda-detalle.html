<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${producto.nombre} + ' - Sarichi'">Producto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --rosa:#E8527A; --celeste:#2DB5C8; --crema:#FDFAF6; }
    body { background:var(--crema); font-family:'Inter',sans-serif; }
    .navbar { background:#fff; border-bottom:2px solid #f0d0da; }
    .navbar-brand { font-family:'Playfair Display',serif; color:var(--rosa)!important; }
    .card-producto { background:#fff; border-radius:20px; border:none; }
    .precio { color:var(--rosa); font-weight:700; font-size:1.5rem; }
    .badge-cat { background:var(--celeste); color:#fff; padding:4px 12px; border-radius:20px; font-size:.8rem; }
    h1 { font-family:'Playfair Display',serif; color:var(--rosa); }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/api/web/">🐱 Sarichi</a>
      <a href="/api/web/tienda" class="btn btn-sm btn-outline-secondary">&larr; Volver a tienda</a>
    </div>
  </nav>

  <div class="container py-4">
    <div class="card card-producto shadow-sm p-4">
      <div class="row g-4">
        <div class="col-md-5 text-center">
          <div style="font-size:6rem;">🧸</div>
        </div>
        <div class="col-md-7">
          <span class="badge-cat" th:text="${producto.categoria}">Categoria</span>
          <h1 class="mt-2" th:text="${producto.nombre}">Nombre</h1>
          <p class="text-muted" th:text="${producto.descripcion}">Descripcion</p>
          <p class="precio">$<span th:text="${producto.precioBase}">0</span></p>
          <p class="text-muted small">Stock disponible: <span th:text="${producto.stock}">0</span></p>

          <!-- Calificacion promedio -->
          <div class="mb-3">
            <span th:if="${totalResenas > 0}">
              <span th:each="i : ${#numbers.sequence(1, 5)}">
                <i class="bi bi-star-fill" style="color:gold;"
                   th:if="${i <= promedioCalificacion}"></i>
                <i class="bi bi-star" style="color:gold;"
                   th:unless="${i <= promedioCalificacion}"></i>
              </span>
              <small class="text-muted ms-2" th:text="'(' + ${totalResenas} + ' reseñas)'">(0)</small>
            </span>
            <span th:unless="${totalResenas > 0}" class="text-muted small">Sin reseñas aún</span>
          </div>

          <th:block th:if="${usuarioWeb != null}">
            <form method="post" th:action="@{/api/web/carrito/agregar}" class="mt-3">
              <input type="hidden" name="productoId" th:value="${producto.id}">
              <div class="input-group mb-3" style="max-width:150px;">
                <input type="number" name="cantidad" class="form-control" value="1" min="1" th:max="${producto.stock}">
              </div>
              <button type="submit" class="btn btn-lg" style="background:var(--rosa);color:#fff;">
                <i class="bi bi-cart-plus me-2"></i>Agregar al carrito
              </button>
            </form>
          </th:block>
          <th:block th:unless="${usuarioWeb != null}">
            <a href="/api/web/login" class="btn btn-lg" style="background:var(--rosa);color:#fff;">
              <i class="bi bi-box-arrow-in-right me-2"></i>Inicia sesión para comprar
            </a>
          </th:block>
        </div>
      </div>
    </div>

    <!-- Reseñas -->
    <div class="card card-producto shadow-sm p-4 mt-4">
      <h3 class="mb-3" style="font-family:'Playfair Display',serif;color:var(--rosa);">
        <i class="bi bi-star me-2"></i>Reseñas
      </h3>

      <th:block th:if="${usuarioWeb != null}">
        <div class="card bg-light p-3 mb-4">
          <h6>Escribe una reseña</h6>
          <form method="post" th:action="@{/api/web/tienda/{id}/resena(id=${producto.id})}">
            <div class="mb-2">
              <label class="form-label small">Calificación</label>
              <div>
                <select name="calificacion" class="form-select form-select-sm" style="max-width:120px;">
                  <option value="5">5 - Excelente</option>
                  <option value="4">4 - Muy bueno</option>
                  <option value="3">3 - Bueno</option>
                  <option value="2">2 - Regular</option>
                  <option value="1">1 - Malo</option>
                </select>
              </div>
            </div>
            <div class="mb-2">
              <label class="form-label small">Comentario (opcional)</label>
              <textarea name="comentario" class="form-control" rows="2" placeholder="Cuenta tu experiencia con este producto..."></textarea>
            </div>
            <button type="submit" class="btn btn-sm" style="background:var(--rosa);color:#fff;">
              <i class="bi bi-send me-1"></i>Enviar reseña
            </button>
          </form>
        </div>
      </th:block>
      <th:block th:unless="${usuarioWeb != null}">
        <div class="alert alert-info py-2 mb-4">
          <a href="/api/web/login" class="alert-link">Inicia sesión</a> para escribir una reseña.
        </div>
      </th:block>

      <div th:if="${resenas != null and !resenas.isEmpty()}">
        <div th:each="r : ${resenas}" class="border-bottom pb-3 mb-3">
          <div class="d-flex justify-content-between align-items-center">
            <strong th:text="${r.usuarioNombre}">Usuario</strong>
            <small class="text-muted" th:text="${r.fechaCreacion}">Fecha</small>
          </div>
          <div class="mb-1">
            <span th:each="i : ${#numbers.sequence(1, 5)}">
              <i class="bi bi-star-fill" style="color:gold;font-size:.85rem;"
                 th:if="${i <= r.calificacion}"></i>
              <i class="bi bi-star" style="color:gold;font-size:.85rem;"
                 th:unless="${i <= r.calificacion}"></i>
            </span>
          </div>
          <p class="mb-0 small" th:if="${r.comentario}" th:text="${r.comentario}">Comentario</p>
        </div>
      </div>
      <div th:if="${resenas == null or resenas.isEmpty()}" class="text-center py-4">
        <div style="font-size:2.5rem;">💬</div>
        <p class="text-muted">Este producto aún no tiene reseñas. ¡Sé el primero en opinar!</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
