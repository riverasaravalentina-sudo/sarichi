<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${accion} + ' Color — Crocheting Sarichi'">Color de Hilo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --rosa:#E8527A; --celeste:#2DB5C8; --crema:#FDFAF6; }
    body { background:var(--crema); font-family:'Inter',sans-serif; }
    .navbar { background:#fff; border-bottom:2px solid #b0e8f0; padding:10px 0; }
    .navbar-brand { font-family:'Playfair Display',serif; color:var(--rosa)!important; font-size:1.3rem; }
    .form-card {
      background:#fff;border-radius:20px;border:1.5px solid #b0e8f0;
      padding:36px 32px;max-width:560px;margin:0 auto;
      box-shadow:0 4px 20px rgba(45,181,200,.1);
    }
    .form-card h3 { font-family:'Playfair Display',serif; color:var(--celeste); margin-bottom:24px; }
    .form-label { font-weight:600;color:#555;font-size:.88rem; }
    .form-control,.form-select { border:1.5px solid #b0e8f0;border-radius:10px;padding:10px 14px;font-size:.92rem;transition:.2s; }
    .form-control:focus,.form-select:focus { border-color:var(--celeste);box-shadow:0 0 0 3px rgba(45,181,200,.12);outline:none; }
    .btn-guardar { background:var(--celeste);color:#fff;border:none;border-radius:20px;padding:10px 28px;font-weight:600;transition:.2s; }
    .btn-guardar:hover { background:#1fa0b2;color:#fff; }
    .btn-cancelar { background:#f5f5f5;color:#666;border:none;border-radius:20px;padding:10px 24px;font-weight:600;transition:.2s;text-decoration:none;display:inline-block; }
    .btn-cancelar:hover { background:#eee;color:#444; }
    .preview-color { width:40px;height:40px;border-radius:10px;border:2px solid rgba(0,0,0,.1);transition:.3s; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container d-flex align-items-center gap-3">
    <a th:href="@{/web/colores}" style="color:var(--celeste);text-decoration:none;font-size:1.2rem">
      <i class="bi bi-arrow-left-circle"></i>
    </a>
    <a class="navbar-brand mb-0" th:href="@{/web/}">🐱 Crocheting Sarichi</a>
  </div>
</nav>

<div class="container py-5">
  <div class="form-card">
    <h3>
      <i class="bi bi-palette me-2"></i>
      <span th:text="${accion} + ' Color de Hilo'">Color</span>
    </h3>

    <form th:action="@{/web/colores/guardar}" method="post">
      <input type="hidden" name="id" th:value="${color.id}">

      <div class="row g-3">

        <div class="col-12">
          <label class="form-label">Nombre <span style="color:var(--rosa)">*</span></label>
          <input type="text" name="nombre" class="form-control"
                 th:value="${color.nombre}" placeholder="Ej: Rosa Pastel" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Código Hex <span style="color:var(--rosa)">*</span></label>
          <div class="input-group">
            <input type="color" id="colorPicker" class="form-control form-control-color"
                   th:value="${color.codigoHex} ?: '#E8527A'"
                   style="max-width:50px;padding:4px;border-radius:10px 0 0 10px">
            <input type="text" name="codigoHex" id="hexInput" class="form-control"
                   th:value="${color.codigoHex}" placeholder="#E8527A" required
                   style="border-radius:0 10px 10px 0">
          </div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Vista previa</label>
          <div id="colorPreview" class="preview-color"
               th:style="'background-color:' + (${color.codigoHex} ?: '#E8527A')"></div>
        </div>

        <div class="col-md-6">
          <label class="form-label">Stock (metros)</label>
          <input type="number" name="stockMetros" class="form-control"
                 th:value="${color.stockMetros} ?: 0" placeholder="100" min="0" step="0.5">
        </div>

        <div class="col-md-6">
          <label class="form-label">Stock Mínimo (metros)</label>
          <input type="number" name="stockMinimo" class="form-control"
                 th:value="${color.stockMinimo} ?: 5" placeholder="20" min="0" step="0.5">
        </div>

        <div class="col-md-6">
          <label class="form-label">Proveedor</label>
          <input type="text" name="proveedor" class="form-control"
                 th:value="${color.proveedor}" placeholder="Nombre del proveedor">
        </div>

        <div class="col-md-6">
          <label class="form-label">Precio por Metro (COP)</label>
          <input type="number" name="precioMetro" class="form-control"
                 th:value="${color.precioMetro}" placeholder="500" min="0" step="50">
        </div>

        <div class="col-12">
          <label class="form-label">Descripción</label>
          <input type="text" name="descripcion" class="form-control"
                 th:value="${color.descripcion}" placeholder="Descripción opcional">
        </div>

        <div class="col-12 d-flex gap-3 mt-2">
          <button type="submit" class="btn-guardar">
            <i class="bi bi-floppy-fill me-1"></i>Guardar
          </button>
          <a th:href="@{/web/colores}" class="btn-cancelar">
            <i class="bi bi-x-circle me-1"></i>Cancelar
          </a>
        </div>

      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  // Sincronizar color picker con input de texto
  const picker = document.getElementById('colorPicker');
  const hexInput = document.getElementById('hexInput');
  const preview = document.getElementById('colorPreview');

  picker.addEventListener('input', () => {
    hexInput.value = picker.value.toUpperCase();
    preview.style.backgroundColor = picker.value;
  });
  hexInput.addEventListener('input', () => {
    const val = hexInput.value.trim();
    if (/^#[0-9A-Fa-f]{6}$/.test(val)) {
      picker.value = val;
      preview.style.backgroundColor = val;
    }
  });
</script>
</body>
</html>
