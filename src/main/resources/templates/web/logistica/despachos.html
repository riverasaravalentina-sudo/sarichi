<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Despachos - Logística Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/logistica}">🐱 LOGÍSTICA</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Gestión de Despachos</h2>
    <div class="card shadow-sm">
      <div class="card-body">
        <div th:if="${despachos != null and !despachos.isEmpty()}">
          <table class="table table-hover">
            <thead><tr><th>Pedido</th><th>Cliente</th><th>Ciudad</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody>
              <tr th:each="d : ${despachos}">
                <td th:text="${d.pedidoId}">id</td>
                <td th:text="${d.clienteNombre}">Cliente</td>
                <td th:text="${d.ciudad}">Ciudad</td>
                <td><span class="badge bg-warning" th:text="${d.estado}">Estado</span></td>
                <td>
                  <button class="btn btn-sm btn-primary">Generar guía</button>
                  <button class="btn btn-sm btn-success">Despachar</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${despachos == null or despachos.isEmpty()}" class="text-center py-5">
          <div style="font-size:3rem">📦</div>
          <p class="text-muted">No hay despachos pendientes</p>
        </div>
      </div>
    </div>
    <a th:href="@{/api/web/dashboard/logistica}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
