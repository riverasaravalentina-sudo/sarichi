<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guías de Envío - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/logistica}">🐱 LOGÍSTICA</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarLog">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarLog">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Historial de Guías de Envío</h2>

    <div th:if="${guias == null or guias.isEmpty()}" class="text-center py-5">
      <div style="font-size:3rem">🚚</div>
      <p class="text-muted">No hay guías generadas aún</p>
      <a th:href="@{/api/web/dashboard/logistica}" class="btn btn-outline-secondary">&larr; Volver al dashboard</a>
    </div>

    <div th:if="${guias != null and !guias.isEmpty()}">
      <div class="card shadow-sm">
        <div class="card-body">
          <table class="table table-hover">
            <thead><tr><th>Guía</th><th>Pedido</th><th>Cliente</th><th>Transportadora</th><th>Destino</th><th>Estado</th><th>Fec. estimada</th><th>Acciones</th></tr></thead>
            <tbody>
              <tr th:each="g : ${guias}">
                <td><strong th:text="${g.numeroGuia}">GU-000</strong></td>
                <td th:text="${g.pedidoId}">id</td>
                <td th:text="${g.clienteNombre}">Cliente</td>
                <td th:text="${g.transportadora}">Coordinadora</td>
                <td th:text="${g.ciudadDestino}">Ciudad</td>
                <td>
                  <span class="badge"
                        th:classappend="${g.estado == 'EN_TRANSITO' ? 'bg-primary' : (g.estado == 'ENTREGADO' ? 'bg-success' : (g.estado == 'DEVUELTO' ? 'bg-dark' : 'bg-warning'))}"
                        th:text="${g.estado}">ACTIVA</span>
                </td>
                <td th:text="${g.fechaEstimadaEntrega != null ? #temporals.format(g.fechaEstimadaEntrega, 'dd/MM/yyyy') : '—'}">—</td>
                <td>
                  <a class="btn btn-sm btn-outline-info" th:href="@{/api/web/logistica/seguimiento/{guia}(guia=${g.numeroGuia})}">Seguimiento</a>
                  <button class="btn btn-sm btn-success" data-bs-toggle="modal"
                          th:attr="'data-bs-target=#estadoModal-' + ${g.id}"
                          th:if="${g.estado == 'EN_TRANSITO' or g.estado == 'PENDIENTE'}">Entregado</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

    <!-- Modales para actualizar estado -->
    <div th:each="g : ${guias}">
      <div class="modal fade" th:id="'estadoModal-' + ${g.id}" tabindex="-1" th:if="${g.estado == 'EN_TRANSITO' or g.estado == 'PENDIENTE'}">
        <div class="modal-dialog">
          <div class="modal-content">
            <form th:action="@{/api/web/logistica/despachos/{id}/estado(id=${g.id})}" method="post">
              <div class="modal-header"><h5 class="modal-title">Actualizar estado - Guía <span th:text="${g.numeroGuia}"></span></h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
              <div class="modal-body">
                <div class="mb-3">
                  <label class="form-label">Nuevo estado</label>
                  <select name="estado" class="form-select" required>
                    <option value="EN_TRANSITO">En tránsito</option>
                    <option value="ENTREGADO">Entregado</option>
                    <option value="DEVUELTO">Devuelto</option>
                  </select>
                </div>
                <div class="mb-3">
                  <label class="form-label">Observaciones</label>
                  <textarea name="observaciones" class="form-control" rows="2"></textarea>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button type="submit" class="btn btn-primary">Actualizar estado</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <a th:href="@{/api/web/dashboard/logistica}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
