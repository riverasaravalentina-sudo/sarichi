<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Guías de Envío - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/web/dashboard/logistica}">🐱 LOGÍSTICA</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Historial de Guías de Envío</h2>
    <div class="card shadow-sm">
      <div class="card-body">
        <div th:if="${guias != null and !guias.isEmpty()}">
          <table class="table table-hover">
            <thead><tr><th>Guía</th><th>Pedido</th><th>Transportadora</th><th>Estado</th><th>Seguimiento</th></tr></thead>
            <tbody>
              <tr th:each="g : ${guias}">
                <td th:text="${g.numeroGuia}">MOCK-001</td>
                <td th:text="${g.pedidoId}">id</td>
                <td th:text="${g.transportadora}">Coordinadora</td>
                <td><span class="badge" th:text="${g.estado}">ACTIVA</span></td>
                <td><a class="btn btn-sm btn-outline-info" th:href="@{/web/despachos/seguimiento/{guia}(guia=${g.numeroGuia})}">Ver</a></td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${guias == null or guias.isEmpty()}" class="text-center py-5">
          <div style="font-size:3rem">🚚</div>
          <p class="text-muted">No hay guías generadas aún</p>
        </div>
      </div>
    </div>
    <a th:href="@{/web/dashboard/logistica}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
