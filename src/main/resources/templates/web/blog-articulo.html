<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title th:text="${articulo.titulo} + ' - Blog Sarichi'">Articulo</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --rosa:#E8527A; --celeste:#2DB5C8; --crema:#FDFAF6; }
    body { background:var(--crema); font-family:'Inter',sans-serif; }
    .navbar { background:#fff; border-bottom:2px solid #f0d0da; }
    .navbar-brand { font-family:'Playfair Display',serif; color:var(--rosa)!important; }
    .card-article { background:#fff; border-radius:20px; border:none; }
    h1 { font-family:'Playfair Display',serif; color:var(--rosa); }
    .content { line-height:1.8; color:#444; }
    .content p { margin-bottom:1.2rem; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand fw-bold" href="/api/web/">🐱 Sarichi</a>
      <a href="/api/web/blog" class="btn btn-sm btn-outline-secondary">&larr; Volver al blog</a>
    </div>
  </nav>

  <div class="container py-4">
    <div class="card-article shadow-sm p-4">
      <div class="text-center mb-4" style="font-size:4rem;">📖</div>
      <h1 class="text-center" th:text="${articulo.titulo}">Titulo</h1>
      <p class="text-muted text-center small">
        <span th:text="${articulo.fechaPublicacion}">fecha</span>
        <span th:if="${articulo.autorNombre}"> · Por <span th:text="${articulo.autorNombre}">autor</span></span>
      </p>
      <hr>
      <div class="content" th:utext="${articulo.contenidoHtml}">Contenido del articulo...</div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
