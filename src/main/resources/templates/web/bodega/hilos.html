<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hilos - Bodega Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/bodega}">🐱 BODEGA</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Control de Hilos e Insumos</h2>
    <div class="card shadow-sm">
      <div class="card-body">
        <div th:if="${hilos != null and !hilos.isEmpty()}">
          <table class="table table-hover">
            <thead><tr><th>Material</th><th>Color</th><th>Cantidad (gr)</th><th>Proveedor</th><th>Acciones</th></tr></thead>
            <tbody>
              <tr th:each="h : ${hilos}">
                <td th:text="${h.tipo}">Algodón</td>
                <td><span class="badge bg-secondary" th:text="${h.color}">Rojo</span></td>
                <td><span th:classappend="${h.cantidad <= 200 ? 'text-danger fw-bold' : ''}" th:text="${h.cantidad}">0</span></td>
                <td th:text="${h.proveedor}">Proveedor</td>
                <td>
                  <button class="btn btn-sm btn-outline-primary">Ingresar</button>
                  <button class="btn btn-sm btn-outline-danger">Salida</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${hilos == null or hilos.isEmpty()}" class="text-center py-5">
          <div style="font-size:3rem">🧶</div>
          <p class="text-muted">No hay hilos registrados</p>
        </div>
      </div>
    </div>
    <a th:href="@{/api/web/dashboard/bodega}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
