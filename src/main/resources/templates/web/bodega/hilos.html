<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hilos - Bodega Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}.critical{background-color:#ffe5e5}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/bodega}">📦 BODEGA</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/bodega/inventario}">Inventario</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/bodega/hilos}">Hilos</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/bodega/movimientos}">Bitácora</a></li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Control de Hilos e Insumos</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card shadow-sm">
      <div class="card-body">
        <div th:if="${hilos != null and !hilos.isEmpty()}">
          <table class="table table-hover">
            <thead><tr><th>Nombre</th><th>Color</th><th>Stock (m)</th><th>Mínimo</th><th>Proveedor</th><th>Precio/m</th><th>Acción</th></tr></thead>
            <tbody>
              <tr th:each="h : ${hilos}" th:classappend="${h.stockMetros <= h.stockMinimo ? 'critical' : ''}">
                <td th:text="${h.nombre}">Algodón</td>
                <td><span class="badge" style="background:${h.codigoHex};color:#fff;width:24px;height:24px;border-radius:50%;display:inline-block" th:title="${h.codigoHex}">&nbsp;</span></td>
                <td><span th:classappend="${h.stockMetros <= h.stockMinimo ? 'text-danger fw-bold' : ''}" th:text="${#numbers.formatDecimal(h.stockMetros, 0, 'COMMA', 1, 'POINT')}">0</span></td>
                <td th:text="${#numbers.formatDecimal(h.stockMinimo, 0, 'COMMA', 1, 'POINT')}">0</td>
                <td th:text="${h.proveedor ?: '-'}">Proveedor</td>
                <td th:if="${h.precioMetro != null}">$<span th:text="${#numbers.formatDecimal(h.precioMetro, 0, 'COMMA', 0, 'POINT')}">0</span></td>
                <td th:if="${h.precioMetro == null}">-</td>
                <td>
                  <button class="btn btn-sm btn-success" data-bs-toggle="modal" data-bs-target="#entradaModal" th:attr="data-id=${h.id}, data-nombre=${h.nombre}"><i class="bi bi-plus-circle"></i> Entrada</button>
                  <button class="btn btn-sm btn-danger" data-bs-toggle="modal" data-bs-target="#salidaModal" th:attr="data-id=${h.id}, data-nombre=${h.nombre}"><i class="bi bi-dash-circle"></i> Salida</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${hilos == null or hilos.isEmpty()}" class="text-center py-5">
          <div style="font-size:3rem">🧶</div>
          <p class="text-muted">No hay hilos registrados</p>
        </div>
      </div>
    </div>
    <a th:href="@{/api/web/dashboard/bodega}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>

  <div class="modal fade" id="entradaModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form method="post" th:action="@{/api/web/bodega/hilos/entrada/__${id}__}" id="entradaForm">
          <div class="modal-header"><h5 class="modal-title">Registrar entrada</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body">
            <p class="text-muted" id="entradaNombre"></p>
            <div class="mb-3">
              <label class="fw-medium">Cantidad (metros)</label>
              <input type="number" name="cantidad" class="form-control" step="0.5" min="0.1" required>
            </div>
            <div class="mb-3">
              <label class="fw-medium">Observación</label>
              <input type="text" name="observacion" class="form-control" placeholder="Ej: Nuevo lote comprado">
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-success">Registrar entrada</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <div class="modal fade" id="salidaModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <form method="post" th:action="@{/api/web/bodega/hilos/salida/__${id}__}" id="salidaForm">
          <div class="modal-header"><h5 class="modal-title">Registrar salida</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
          <div class="modal-body">
            <p class="text-muted" id="salidaNombre"></p>
            <div class="mb-3">
              <label class="fw-medium">Cantidad (metros)</label>
              <input type="number" name="cantidad" class="form-control" step="0.5" min="0.1" required>
            </div>
            <div class="mb-3">
              <label class="fw-medium">Observación</label>
              <input type="text" name="observacion" class="form-control" placeholder="Ej: Usado para pedido #123">
            </div>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-danger">Registrar salida</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    ['entradaModal', 'salidaModal'].forEach(function(id) {
      document.getElementById(id).addEventListener('show.bs.modal', function (e) {
        var btn = e.relatedTarget;
        var itemId = btn.getAttribute('data-id');
        var nombre = btn.getAttribute('data-nombre');
        document.getElementById(id.replace('Modal', 'Nombre')).textContent = nombre;
        document.getElementById(id.replace('Modal', 'Form')).action = '/api/web/bodega/hilos/' + id.replace('Modal', '').toLowerCase() + '/' + itemId;
      });
    });
  </script>
</body>
</html>
