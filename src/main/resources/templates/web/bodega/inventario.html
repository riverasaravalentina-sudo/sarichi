<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inventario - Bodega Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/bodega}">🐱 BODEGA</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Inventario de Productos</h2>
    <div class="card shadow-sm">
      <div class="card-body">
        <div th:if="${productos != null and !productos.isEmpty()}">
          <table class="table table-hover">
            <thead><tr><th>Producto</th><th>Stock</th><th>Precio</th><th>Estado</th><th>Acciones</th></tr></thead>
            <tbody>
              <tr th:each="p : ${productos}">
                <td th:text="${p.nombre}">Nombre</td>
                <td><span th:classappend="${p.stock <= 5 ? 'text-danger fw-bold' : ''}" th:text="${p.stock}">0</span></td>
                <td>$<span th:text="${p.precio}">0</span></td>
                <td><span class="badge" th:classappend="${p.stock > 10 ? 'bg-success' : p.stock > 5 ? 'bg-warning text-dark' : 'bg-danger'}" th:text="${p.stock > 10 ? 'Disponible' : p.stock > 5 ? 'Bajo stock' : 'Crítico'}">Stock</span></td>
                <td>
                  <button class="btn btn-sm btn-outline-primary">Ajustar stock</button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${productos == null or productos.isEmpty()}" class="text-center py-5">
          <div style="font-size:3rem">📦</div>
          <p class="text-muted">No hay productos en el inventario</p>
        </div>
      </div>
    </div>
    <a th:href="@{/api/web/dashboard/bodega}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
