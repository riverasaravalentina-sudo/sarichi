<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movimientos - Bodega Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',sans-serif}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/dashboard/bodega}">🐱 BODEGA</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>
  <main class="container py-5">
    <h2 class="mb-4">Historial de Movimientos de Bodega</h2>
    <div class="card shadow-sm">
      <div class="card-body">
        <div th:if="${movimientos != null and !movimientos.isEmpty()}">
          <table class="table table-hover">
            <thead><tr><th>Fecha</th><th>Tipo</th><th>Producto/Material</th><th>Cantidad</th><th>Responsable</th></tr></thead>
            <tbody>
              <tr th:each="m : ${movimientos}">
                <td th:text="${m.fecha}">2026-01-01</td>
                <td><span class="badge" th:classappend="${m.tipo == 'ENTRADA' ? 'bg-success' : 'bg-danger'}" th:text="${m.tipo}">ENTRADA</span></td>
                <td th:text="${m.itemNombre}">Producto</td>
                <td th:text="${m.cantidad}">0</td>
                <td th:text="${m.responsable}">Usuario</td>
              </tr>
            </tbody>
          </table>
        </div>
        <div th:if="${movimientos == null or movimientos.isEmpty()}" class="text-center py-5">
          <div style="font-size:3rem">📋</div>
          <p class="text-muted">No hay movimientos registrados</p>
        </div>
      </div>
    </div>
    <a th:href="@{/api/web/dashboard/bodega}" class="btn btn-outline-secondary mt-3">&larr; Volver al dashboard</a>
  </main>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
