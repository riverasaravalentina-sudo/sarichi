<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mi Panel - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',system-ui,Arial}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" href="/web/">🐱 CLIENTE</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/web/carrito">Carrito</a></li>
          <li class="nav-item"><a class="nav-link" href="/web/mis-pedidos">Mis pedidos</a></li>
          <li class="nav-item"><a class="nav-link" href="/web/logout">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h2 class="mb-4">Mi Panel de Compras</h2>
    
    <div class="row">
      <div class="col-md-8">
        <h5>Catálogo disponible</h5>
        <div class="row g-3">
          <div th:each="p : ${productos}" class="col-md-4">
            <div class="card shadow-sm">
              <div class="card-body">
                <h6 th:text="${p.nombre}">Producto</h6>
                <p class="text-muted small" th:text="${p.categoria}">Categoría</p>
                <p class="fw-bold brand">$<span th:text="${p.precioBase}">0</span></p>
                <form method="post" th:action="@{/web/carrito/agregar}">
                  <input type="hidden" name="productoId" th:value="${p.id}">
                  <input type="hidden" name="cantidad" value="1">
                  <button type="submit" class="btn btn-sm btn-primary w-100">Agregar al carrito</button>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Acceso rápido</h5></div>
          <div class="card-body">
            <a href="/web/carrito" class="btn btn-outline-primary w-100 mb-2"><i class="bi bi-cart"></i> Ver carrito</a>
            <a href="/web/mis-pedidos" class="btn btn-outline-info w-100 mb-2"><i class="bi bi-box"></i> Mis pedidos</a>
            <a href="/web/pedido-personalizado" class="btn btn-outline-success w-100 mb-2"><i class="bi bi-pencil"></i> Pedido personalizado</a>
            <a href="/web/wishlist" class="btn btn-outline-danger w-100 mb-2"><i class="bi bi-heart"></i> Wishlist</a>
            <a href="/web/personalizador" class="btn btn-outline-secondary w-100 mb-2"><i class="bi bi-palette"></i> Personalizador</a>
            <a href="/web/mis-pedidos" class="btn btn-outline-teal w-100"><i class="bi bi-chat-dots"></i> Chat con artesana</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
