<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Artesana - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',system-ui,Arial}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/api/web/}">🐱 ARTESANA</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/dashboard/artesana}">Pedidos activos</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/artesana/pedidos}">Todos los pedidos</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/artesana/cotizaciones}">Cotizaciones</a></li>
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/artesana/proceso}">Galería</a></li>
        </ul>
        <ul class="navbar-nav">
          <li class="nav-item"><a class="nav-link" th:href="@{/api/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h2 class="mb-4">Mi Taller de Producción</h2>
    
    <div class="row g-3">
      <div class="col-md-12">
        <div class="card shadow-sm">
          <div class="card-header bg-light d-flex justify-content-between align-items-center">
            <h5 class="mb-0">Pedidos activos</h5>
            <a th:href="@{/api/web/artesana/cotizaciones}" class="btn btn-sm btn-success">Cotizaciones pendientes</a>
          </div>
          <table class="table table-hover mb-0">
            <thead>
              <tr><th>ID</th><th>Cliente</th><th>Estado</th><th>Acciones</th></tr>
            </thead>
            <tbody>
              <tr th:each="p : ${pedidos}">
                <td th:text="${p.id}">id</td>
                <td th:text="${p.usuarioNombre}">Cliente</td>
                <td><span class="badge" th:classappend="${p.estado == 'PENDIENTE' ? 'bg-warning' : p.estado == 'EN_PRODUCCION' ? 'bg-info' : p.estado == 'LISTO' ? 'bg-success' : p.estado == 'DESPACHADO' ? 'bg-primary' : p.estado == 'ENTREGADO' ? 'bg-secondary' : 'bg-dark'}" th:text="${p.estado}">estado</span></td>
                <td>
                  <a th:href="@{/api/web/chat/{id}(id=${p.id})}" class="btn btn-sm btn-outline-info"><i class="bi bi-chat-dots"></i> Chat</a>
                  <form th:action="@{/api/web/pedidos/{id}/estado(id=${p.id})}" method="post" style="display:inline">
                    <select name="estado" class="form-select form-select-sm d-inline w-auto" required>
                      <option value="">Cambiar...</option>
                      <option th:if="${p.estado == 'PENDIENTE'}" value="EN_PRODUCCION">→ En producción</option>
                      <option th:if="${p.estado == 'EN_PRODUCCION'}" value="LISTO">→ Listo</option>
                      <option th:if="${p.estado == 'LISTO'}" value="DESPACHADO">→ Despachado</option>
                      <option th:if="${p.estado == 'DESPACHADO'}" value="ENTREGADO">→ Entregado</option>
                      <option th:if="${p.estado != 'ENTREGADO' and p.estado != 'CANCELADO'}" value="CANCELADO">✕ Cancelar</option>
                    </select>
                    <button type="submit" class="btn btn-sm btn-outline-secondary"><i class="bi bi-arrow-right"></i></button>
                  </form>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
