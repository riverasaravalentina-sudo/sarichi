<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Bodega - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',system-ui,Arial}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}.critical{background-color:#ffe5e5}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" th:href="@{/web/}">🐱 BODEGA</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" th:href="@{/web/logout}">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h2 class="mb-4">Control de Inventario</h2>
    
    <div class="row g-3 mb-4">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Colores de hilo</h5></div>
          <div class="table-responsive">
            <table class="table table-sm mb-0">
              <thead>
                <tr><th>Nombre</th><th>Stock (m)</th><th>Mínimo</th><th>Estado</th></tr>
              </thead>
              <tbody>
                <tr th:each="c : ${colores}" th:classappend="${c.stockMetros <= c.stockMinimo ? 'critical' : ''}">
                  <td th:text="${c.nombre}">Color</td>
                  <td th:text="${c.stockMetros}">0</td>
                  <td th:text="${c.stockMinimo}">0</td>
                  <td>
                    <span th:if="${c.stockMetros <= c.stockMinimo}" class="badge bg-danger">Crítico</span>
                    <span th:unless="${c.stockMetros <= c.stockMinimo}" class="badge bg-success">OK</span>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Productos en stock</h5></div>
          <div class="table-responsive">
            <table class="table table-sm mb-0">
              <thead>
                <tr><th>Producto</th><th>Stock</th><th>Estado</th></tr>
              </thead>
              <tbody>
                <tr th:each="p : ${productos}">
                  <td th:text="${p.nombre}">Producto</td>
                  <td th:text="${p.stock}">0</td>
                  <td><span class="badge bg-info" th:text="${p.estado}">ACTIVO</span></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
