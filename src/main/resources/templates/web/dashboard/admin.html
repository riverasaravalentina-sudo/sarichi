<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard ADMIN - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',system-ui,Arial}.brand{color:#E8527A}.accent{color:#2DB5C8}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" href="/web/">🐱 ADMIN</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/web/productos">Productos</a></li>
          <li class="nav-item"><a class="nav-link" href="/web/colores">Colores</a></li>
          <li class="nav-item"><a class="nav-link" href="/web/pedidos">Pedidos</a></li>
          <li class="nav-item"><a class="nav-link" href="/web/logout">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h2 class="mb-4">Panel Administrativo</h2>
    
    <div th:if="${errorKpis}" class="alert alert-danger" th:text="${errorKpis}"></div>
    
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <h6 class="text-muted">Ventas hoy</h6>
            <h3 class="brand">$<span th:text="${kpis.ventasHoy}">0</span></h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <h6 class="text-muted">Pedidos pendientes</h6>
            <h3 class="brand" th:text="${kpis.pedidosPendientes}">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <h6 class="text-muted">Stock crítico</h6>
            <h3 class="brand" th:text="${kpis.stockCritico}">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="card shadow-sm">
          <div class="card-body">
            <h6 class="text-muted">Total clientes</h6>
            <h3 class="accent" th:text="${kpis.totalClientes}">0</h3>
          </div>
        </div>
      </div>
    </div>

    <div class="row">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Acceso rápido</h5></div>
          <div class="card-body">
            <a href="/web/productos" class="btn btn-outline-primary w-100 mb-2"><i class="bi bi-box"></i> Gestionar Productos</a>
            <a href="/web/colores" class="btn btn-outline-info w-100 mb-2"><i class="bi bi-palette"></i> Gestionar Colores</a>
            <a href="/web/usuarios" class="btn btn-outline-secondary w-100 mb-2"><i class="bi bi-people"></i> Usuarios</a>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Resumen</h5></div>
          <div class="card-body">
            <p><strong>Total productos:</strong> <span th:text="${kpis.totalProductos}">0</span></p>
            <p><strong>En producción:</strong> <span th:text="${kpis.pedidosEnProduccion}">0</span></p>
            <p><strong>Para despachar:</strong> <span th:text="${kpis.productosParaDespachar}">0</span></p>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
