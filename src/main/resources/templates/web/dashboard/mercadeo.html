<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Mercadeo - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',system-ui,Arial}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" href="/web/">🐱 MERCADEO</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/web/logout">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h2 class="mb-4">Panel de Mercadeo</h2>
    
    <div class="row g-3">
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Gestionar contenido</h5></div>
          <div class="card-body">
            <a href="/web/mercadeo/blog" class="btn btn-outline-primary w-100 mb-2"><i class="bi bi-pencil"></i> Blog</a>
            <a href="/web/mercadeo/galeria" class="btn btn-outline-info w-100 mb-2"><i class="bi bi-images"></i> Galería</a>
            <a href="/web/mercadeo/retos" class="btn btn-outline-success w-100 mb-2"><i class="bi bi-trophy"></i> Retos mensuales</a>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Analíticas</h5></div>
          <div class="card-body">
            <p><strong>Visitas:</strong> <span class="badge bg-info">0</span></p>
            <p><strong>Conversión:</strong> <span class="badge bg-success">0%</span></p>
            <p><strong>Tráfico directo:</strong> <span class="badge bg-secondary">0</span></p>
            <a href="/web/mercadeo/analiticas" class="btn btn-outline-secondary btn-sm mt-2">Ver detalle</a>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
