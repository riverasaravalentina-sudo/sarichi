<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Panel Logística - Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <style>body{background:#FDFAF6;font-family:'Inter',system-ui,Arial}.brand{color:#E8527A}.navbar{background:#fff;border-bottom:1px solid #e9ecef}</style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container-fluid">
      <a class="navbar-brand brand fw-bold" href="/web/">🐱 LOGÍSTICA</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="/web/logout">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-5">
    <h2 class="mb-4">Panel de Despachos</h2>
    
    <div class="row g-3">
      <div class="col-md-12">
        <div class="card shadow-sm">
          <div class="card-header bg-light"><h5>Despachos pendientes</h5></div>
          <div class="table-responsive">
            <table class="table table-hover mb-0">
              <thead>
                <tr><th>Pedido</th><th>Cliente</th><th>Estado</th><th>Acciones</th></tr>
              </thead>
              <tbody>
                <tr th:each="d : ${despachos}">
                  <td th:text="${d.pedidoId}">id</td>
                  <td th:text="${d.clienteNombre}">Cliente</td>
                  <td><span class="badge bg-warning" th:text="${d.estado}">estado</span></td>
                  <td><button class="btn btn-sm btn-outline-primary">Generar guía</button></td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
