<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title th:text="${accion} + ' Producto — Crocheting Sarichi'">Producto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --rosa:#E8527A; --celeste:#2DB5C8; --crema:#FDFAF6; }
    body { background:var(--crema); font-family:'Inter',sans-serif; }
    .navbar { background:#fff; border-bottom:2px solid #f0d0da; padding:10px 0; }
    .navbar-brand { font-family:'Playfair Display',serif; color:var(--rosa)!important; font-size:1.3rem; }

    .form-card {
      background:#fff; border-radius:20px; border:1.5px solid #f0d0da;
      padding:36px 32px; max-width:640px; margin:0 auto;
      box-shadow:0 4px 20px rgba(232,82,122,.08);
    }
    .form-card h3 { font-family:'Playfair Display',serif; color:var(--rosa); margin-bottom:24px; }
    .form-label { font-weight:600; color:#555; font-size:.88rem; }
    .form-control, .form-select {
      border:1.5px solid #e0c0c8; border-radius:10px;
      padding:10px 14px; font-size:.92rem; transition:.2s;
    }
    .form-control:focus, .form-select:focus {
      border-color:var(--rosa); box-shadow:0 0 0 3px rgba(232,82,122,.12); outline:none;
    }
    .btn-guardar {
      background:var(--rosa);color:#fff;border:none;border-radius:20px;
      padding:10px 28px;font-weight:600;transition:.2s;
    }
    .btn-guardar:hover { background:#d43e68;color:#fff; }
    .btn-cancelar {
      background:#f5f5f5;color:#666;border:none;border-radius:20px;
      padding:10px 24px;font-weight:600;transition:.2s;text-decoration:none;display:inline-block;
    }
    .btn-cancelar:hover { background:#eee;color:#444; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="container d-flex align-items-center gap-3">
    <a th:href="@{/api/web/productos}" style="color:var(--celeste);text-decoration:none;font-size:1.2rem">
      <i class="bi bi-arrow-left-circle"></i>
    </a>
    <a class="navbar-brand mb-0" th:href="@{/api/web/}">🐱 Crocheting Sarichi</a>
  </div>
</nav>

<div class="container py-5">
  <div class="form-card">
    <h3>
      <i class="bi bi-box-seam me-2"></i>
      <span th:text="${accion} + ' Producto'">Producto</span>
    </h3>

    <form th:action="@{/api/web/productos/guardar}" method="post">
      <!-- ID oculto para edición -->
      <input type="hidden" name="id" th:value="${producto.id}">

      <div class="row g-3">

        <div class="col-12">
          <label class="form-label">Nombre <span style="color:var(--rosa)">*</span></label>
          <input type="text" name="nombre" class="form-control"
                 th:value="${producto.nombre}" placeholder="Ej: Osito Amigurumi" required>
        </div>

        <div class="col-12">
          <label class="form-label">Descripción</label>
          <textarea name="descripcion" class="form-control" rows="3"
                    placeholder="Describe el producto..." th:text="${producto.descripcion}"></textarea>
        </div>

        <div class="col-md-6">
          <label class="form-label">Precio Base (COP) <span style="color:var(--rosa)">*</span></label>
          <input type="number" name="precioBase" class="form-control"
                 th:value="${producto.precioBase}" placeholder="45000" min="0" step="100" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Stock <span style="color:var(--rosa)">*</span></label>
          <input type="number" name="stock" class="form-control"
                 th:value="${producto.stock} ?: 0" placeholder="0" min="0" required>
        </div>

        <div class="col-md-6">
          <label class="form-label">Categoría <span style="color:var(--rosa)">*</span></label>
          <select name="categoria" class="form-select" required>
            <option value="">Selecciona una categoría</option>
            <option th:each="cat : ${categorias}" th:value="${cat}" th:text="${cat}"
                    th:selected="${cat == producto.categoria}">Categoría</option>
          </select>
        </div>

        <div class="col-md-6">
          <label class="form-label">Tiempo Elaboración (días)</label>
          <input type="number" name="tiempoElaboracionDias" class="form-control"
                 th:value="${producto.tiempoElaboracionDias}" placeholder="3" min="1">
        </div>

        <div class="col-md-6" th:if="${producto.id != null}">
          <label class="form-label">Estado</label>
          <select name="estado" class="form-select">
            <option value="ACTIVO"   th:selected="${producto.estado == 'ACTIVO'}">Activo</option>
            <option value="INACTIVO" th:selected="${producto.estado == 'INACTIVO'}">Inactivo</option>
          </select>
        </div>

        <div class="col-12 d-flex gap-3 mt-2">
          <button type="submit" class="btn-guardar">
            <i class="bi bi-floppy-fill me-1"></i>Guardar
          </button>
          <a th:href="@{/api/web/productos}" class="btn-cancelar">
            <i class="bi bi-x-circle me-1"></i>Cancelar
          </a>
        </div>

      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
