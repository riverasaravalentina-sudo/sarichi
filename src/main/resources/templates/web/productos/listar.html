<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda | Crocheting Sarichi</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

    <style>
        :root{
            --rosa:#E8527A;
            --celeste:#2DB5C8;
            --crema:#FDFAF6;
            --oscuro:#3A2A2A;
        }

        body{
            background:var(--crema);
            font-family:'Inter',sans-serif;
        }

        .navbar{
            background:#fff;
            border-bottom:2px solid #f0d0da;
        }

        .navbar-brand{
            font-family:'Playfair Display',serif;
            color:var(--rosa)!important;
            font-size:1.4rem;
        }

        .hero{
            padding:50px 0;
            text-align:center;
        }

        .hero h1{
            font-family:'Playfair Display',serif;
            color:var(--rosa);
        }

        .hero p{
            color:#777;
        }

        .filtro-card{
            background:#fff;
            border-radius:15px;
            border:1px solid #f0d0da;
            padding:20px;
            margin-bottom:30px;
        }

        .producto-card{
            background:#fff;
            border-radius:18px;
            border:1px solid #f0d0da;
            overflow:hidden;
            height:100%;
            transition:.25s;
        }

        .producto-card:hover{
            transform:translateY(-5px);
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .producto-img{
            height:220px;
            background:#fff0f4;
            display:flex;
            align-items:center;
            justify-content:center;
            font-size:5rem;
        }

        .producto-body{
            padding:20px;
        }

        .categoria{
            display:inline-block;
            background:#fff0f4;
            color:var(--rosa);
            padding:4px 10px;
            border-radius:20px;
            font-size:.8rem;
            font-weight:600;
        }

        .precio{
            color:var(--rosa);
            font-size:1.3rem;
            font-weight:700;
        }

        .btn-sarichi{
            background:var(--rosa);
            color:white;
            border:none;
            border-radius:25px;
            padding:10px 18px;
            font-weight:600;
            width:100%;
        }

        .btn-sarichi:hover{
            background:#d43e68;
            color:white;
        }

        footer{
            margin-top:60px;
            background:white;
            border-top:1px solid #f0d0da;
            padding:20px;
            text-align:center;
            color:#999;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg">
    <div class="container">
        <a class="navbar-brand" th:href="@{/api/web/}">
            🐱 Crocheting Sarichi
        </a>

        <div class="d-flex gap-2">

            <a th:href="@{/api/web/}" class="btn btn-light">
                Inicio
            </a>

            <a th:href="@{/api/web/carrito}" class="btn btn-light">
                <i class="bi bi-cart3"></i>
            </a>

            <a th:if="${usuarioWeb == null}"
               th:href="@{/api/web/login}"
               class="btn btn-outline-secondary">
                Ingresar
            </a>

        </div>
    </div>
</nav>

<section class="hero">
    <div class="container">
        <h1>Nuestra Tienda</h1>
        <p>
            Descubre amigurumis, accesorios y creaciones tejidas artesanalmente.
        </p>
    </div>
</section>

<div class="container">

    <div class="filtro-card">

        <form th:action="@{/api/web/productos}" method="get">

            <div class="row">

                <div class="col-md-4 mb-2">
                    <select name="categoria" class="form-select">
                        <option value="">Todas las categorías</option>

                        <option
                                th:each="cat : ${categorias}"
                                th:value="${cat}"
                                th:text="${cat}"
                                th:selected="${cat == categoria}">
                        </option>

                    </select>
                </div>

                <div class="col-md-6 mb-2">
                    <input
                            type="text"
                            name="busqueda"
                            class="form-control"
                            placeholder="Buscar productos..."
                            th:value="${busqueda}">
                </div>

                <div class="col-md-2 mb-2">
                    <button class="btn btn-sarichi">
                        Buscar
                    </button>
                </div>

            </div>

        </form>

    </div>

    <div class="row g-4">

        <div th:each="p : ${productos}" class="col-md-4">

            <div class="producto-card">

                <div class="producto-img">
                    🧸
                </div>

                <div class="producto-body">

                    <span class="categoria"
                          th:text="${p.categoria}">
                    </span>

                    <h5 class="mt-3"
                        th:text="${p.nombre}">
                    </h5>

                    <p class="text-muted"
                       th:text="${#strings.abbreviate(p.descripcion,100)}">
                    </p>

                    <div class="precio mb-3"
                         th:text="'$ ' + ${#numbers.formatDecimal(p.precioBase,0,'COMMA',0,'POINT')}">
                    </div>

                    <form th:action="@{/api/web/carrito/agregar}" method="post">

                        <input
                                type="hidden"
                                name="productoId"
                                th:value="${p.id}">

                        <button type="submit"
                                class="btn-sarichi">

                            <i class="bi bi-cart-plus"></i>
                            Agregar al carrito

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <div class="text-center mt-5"
         th:if="${productos == null or productos.isEmpty()}">

        <h4>No hay productos disponibles</h4>

        <p class="text-muted">
            Vuelve más tarde para descubrir nuevas creaciones.
        </p>

    </div>

</div>

<footer>
    🧵 Crocheting Sarichi · Tejidos artesanales hechos con amor
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
