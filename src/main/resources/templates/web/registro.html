<!doctype html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro - Crocheting Sarichi</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --rosa:#E8527A; --celeste:#2DB5C8; --crema:#FDFAF6; --oscuro:#332a2d; }
    body { min-height:100vh; background:var(--crema); font-family:Inter,system-ui,sans-serif; color:var(--oscuro); }
    .auth-wrap { min-height:100vh; display:grid; place-items:center; padding:32px 16px; }
    .auth-card { width:min(100%,520px); background:#fff; border:1px solid #f0d0da; border-radius:8px; padding:32px; box-shadow:0 12px 34px rgba(232,82,122,.12); }
    h1 { font-family:"Playfair Display",serif; color:var(--rosa); }
    .btn-sarichi { background:var(--rosa); border-color:var(--rosa); color:#fff; font-weight:700; }
    .btn-sarichi:hover { background:#d73e68; border-color:#d73e68; color:#fff; }
    a { color:var(--celeste); font-weight:700; }
  </style>
</head>
<body>
  <main class="auth-wrap">
    <section class="auth-card">
      <div class="text-center mb-4">
        <div class="fs-1">🐱</div>
        <h1>Crear Cuenta</h1>
        <p class="text-muted mb-0">Tu cuenta se creará como cliente Sarichi.</p>
      </div>

      <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
      <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

      <form method="post" th:action="@{/api/web/registro}" class="row g-3">
        <div class="col-12">
          <label class="form-label" for="nombre">Nombre completo</label>
          <input class="form-control" id="nombre" name="nombre" required>
        </div>
        <div class="col-12">
          <label class="form-label" for="correo">Correo electrónico</label>
          <input class="form-control" id="correo" name="correo" type="email" required>
        </div>
        <div class="col-12">
          <label class="form-label" for="telefono">Teléfono</label>
          <input class="form-control" id="telefono" name="telefono" type="tel">
        </div>
        <div class="col-md-6">
          <label class="form-label" for="contrasena">Contraseña</label>
          <input class="form-control" id="contrasena" name="contrasena" type="password" minlength="8" required>
        </div>
        <div class="col-md-6">
          <label class="form-label" for="confirmarContrasena">Confirmar contraseña</label>
          <input class="form-control" id="confirmarContrasena" name="confirmarContrasena" type="password" minlength="8" required>
        </div>
        <div class="col-12 d-grid">
          <button class="btn btn-sarichi" type="submit">
            <i class="bi bi-person-plus"></i> Crear cuenta
          </button>
        </div>
      </form>

      <div class="text-center mt-4">
        <a th:href="@{/api/web/login}">Ya tengo cuenta</a>
        <span class="mx-2 text-muted">|</span>
        <a th:href="@{/api/web/}">Volver al inicio</a>
      </div>
    </section>
  </main>
</body>
</html>
